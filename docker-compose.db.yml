services:
  postgres:
    image: postgres:16-alpine
    container_name: gharsamma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gharsamma
      POSTGRES_PASSWORD: gharsamma
      POSTGRES_DB: gharsamma
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gharsamma"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
