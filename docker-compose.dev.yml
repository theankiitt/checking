services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gharsamma-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: gharsamma
      POSTGRES_PASSWORD: gharsamma_password
      POSTGRES_DB: gharsamma
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gharsamma"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: gharsamma-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data_dev:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Service - Development with hot reload
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: gharsamma-api-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://gharsamma:gharsamma_password@postgres:5432/gharsamma
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-key-change-in-production
    volumes:
      - ./apps/api:/app
      - /app/node_modules
      - api_uploads_dev:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm dev

  # Web Application - Development with hot reload
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: gharsamma-web-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      - api
    command: pnpm dev

  # Admin Dashboard - Development with hot reload
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile.dev
    container_name: gharsamma-admin-dev
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    volumes:
      - ./apps/admin:/app
      - /app/node_modules
    ports:
      - "4001:4001"
    depends_on:
      - api
    command: pnpm dev

volumes:
  postgres_data_dev:
  redis_data_dev:
  api_uploads_dev:

networks:
  default:
    name: gharsamma-network-dev
