services:
  postgres:
    image: postgres:16-alpine
    container_name: gharsamma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gharsamma}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-gharsamma}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gharsamma}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gharsamma-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: theankitx/gharsamma-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: gharsamma-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4444
      DATABASE_URL: postgresql://${POSTGRES_USER:-gharsamma}:${POSTGRES_PASSWORD:?error}@postgres:5432/${POSTGRES_DB:-gharsamma}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?error}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?error}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://gharsamma.com,https://admin.gharsamma.com,https://api.gharsamma.com}
    ports:
      - "4444:4444"
    volumes:
      - ${UPLOAD_PATH:-./uploads}:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4444/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  web:
    image: theankitx/gharsamma-web:latest
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.gharsamma.com}
    container_name: gharsamma-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "4000:4000"
    depends_on:
      - api

  admin:
    image: theankitx/gharsamma-admin:latest
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.gharsamma.com}
    container_name: gharsamma-admin
    restart: unless-stopped
    environment:
      NODE_ENV: production
    ports:
      - "4001:4001"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: gharsamma-network
